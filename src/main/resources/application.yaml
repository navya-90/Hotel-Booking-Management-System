spring:
  application:
    name: Airbnb

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

jwt:
  secretKey: ${JWT_SECRET}

frontend:
  url: ${FRONTEND_URL}

stripe:
  secret:
    key: ${STRIPE_SECRET_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET}

springdoc:
  swagger-ui:
    operationsSorter: method
    tagsSorter: alpha
